---
# Envoy Proxy для получения статистики Circuit Breaker
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  namespace: cinemaabyss
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 15000
    static_resources:
      listeners:
      - name: movies_service_listener
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 8081
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: movies_service
              route_config:
                name: local_route
                virtual_hosts:
                - name: movies_service
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: movies_service_cluster
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
      - name: movies_service_cluster
        connect_timeout: 5s
        type: LOGICAL_DNS
        dns_lookup_family: V4_ONLY
        lb_policy: ROUND_ROBIN
        circuit_breakers:
          thresholds:
          - priority: DEFAULT
            max_connections: 10
            max_pending_requests: 10
            max_requests: 100
            max_retries: 3
            track_remaining: true
        outlier_detection:
          consecutive_5xx: 3
          interval: 30s
          base_ejection_time: 30s
          max_ejection_percent: 50
        load_assignment:
          cluster_name: movies_service_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: movies-service
                    port_value: 8081

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy-proxy
  namespace: cinemaabyss
  labels:
    app: envoy-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: envoy-proxy
  template:
    metadata:
      labels:
        app: envoy-proxy
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
      - name: envoy
        image: envoyproxy/envoy:v1.28-latest
        ports:
        - containerPort: 8081
          name: movies-proxy
        - containerPort: 15000
          name: admin
        volumeMounts:
        - name: envoy-config
          mountPath: /etc/envoy
        command:
        - /usr/local/bin/envoy
        args:
        - -c
        - /etc/envoy/envoy.yaml
        - --service-cluster
        - movies-service-proxy
        - --service-node
        - movies-service-proxy
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: envoy-config
        configMap:
          name: envoy-config

---
apiVersion: v1
kind: Service
metadata:
  name: envoy-proxy
  namespace: cinemaabyss
  labels:
    app: envoy-proxy
spec:
  ports:
  - port: 8081
    name: movies-proxy
    targetPort: 8081
  - port: 15000
    name: admin
    targetPort: 15000
  selector:
    app: envoy-proxy
  type: ClusterIP