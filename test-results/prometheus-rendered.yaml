
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: cinemaabyss
  labels:
    app: prometheus
    app.kubernetes.io/name: cinemaabyss
    app.kubernetes.io/instance: cinemaabyss
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.45.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9090
        args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus
        - --web.console.libraries=/etc/prometheus/console_libraries
        - --web.console.templates=/etc/prometheus/consoles
        - --storage.tsdb.retention.time=15d
        - --web.enable-lifecycle
        volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus
        - name: prometheus-storage
          mountPath: /prometheus
        resources:
                    limits:
            cpu: 1000m
            memory: 2Gi
          requests:
            cpu: 200m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 15
          periodSeconds: 20
      volumes:
      - name: prometheus-config
        configMap:
          name: prometheus-config
      - name: prometheus-storage
        
        persistentVolumeClaim:
          claimName: prometheus-storage
        {{- else }}
        emptyDir: {}
        
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: cinemaabyss
  labels:
    app: prometheus
    app.kubernetes.io/name: cinemaabyss
    app.kubernetes.io/instance: cinemaabyss
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
  type: ClusterIP
---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-storage
  namespace: cinemaabyss
  labels:
    app: prometheus
    app.kubernetes.io/name: cinemaabyss
    app.kubernetes.io/instance: cinemaabyss
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

